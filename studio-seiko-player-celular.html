<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Studio Seiko · Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8CC80;
    --gold-dim: #7A6028;
    --bg: #080808;
    --surface: #111111;
    --surface2: #181818;
    --surface3: #222222;
    --border: rgba(201,168,76,0.15);
    --border2: rgba(201,168,76,0.3);
    --text: #F0EAD6;
    --text2: #9A917A;
    --text3: #5A5244;
    --radius: 16px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* BG orb */
  .bg-orb {
    position: absolute;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
    top: -80px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.8s;
  }

  /* HEADER */
  .header {
    position: relative;
    z-index: 2;
    padding: 18px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }
  .logo span { color: var(--text2); font-weight: 400; font-size: 10px; display: block; letter-spacing: 4px; margin-top: 1px; }
  .add-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 20px;
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .add-btn:active { transform: scale(0.95); background: var(--gold-light); }
  .add-btn svg { width: 14px; height: 14px; }

  /* PLAYER AREA */
  .player-section {
    position: relative;
    z-index: 2;
    padding: 24px 24px 16px;
    flex-shrink: 0;
  }

  /* Cover art */
  .cover-wrap {
    width: 100%;
    aspect-ratio: 1;
    max-height: 200px;
    margin: 0 auto 20px;
    position: relative;
    border-radius: var(--radius);
    overflow: visible;
  }
  .cover-art {
    width: 100%;
    height: 100%;
    background: var(--surface2);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: visible;
  }
  .cover-art::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(201,168,76,0.04) 0%, transparent 70%);
  }

  /* VINIL */
  .vinyl-wrap {
    position: relative;
    width: 150px; height: 150px;
    display: flex; align-items: center; justify-content: center;
    overflow: visible;
  }
  .vinyl {
    width: 150px; height: 150px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%, #1a1a1a 0%, #111 18%, #0d0d0d 18.5%, #161616 22%, #0d0d0d 22.5%, #1a1a1a 30%, #0d0d0d 30.5%, #161616 36%, #0d0d0d 36.5%, #1a1a1a 43%, #0d0d0d 43.5%, #161616 50%, #0d0d0d 50.5%, #1a1a1a 58%, #0d0d0d 58.5%, #1a1a1a 66%, #0d0d0d 66.5%, #161616 75%, #111 100%);
    box-shadow: 0 0 0 1.5px rgba(201,168,76,0.2), 0 8px 32px rgba(0,0,0,0.8);
    position: relative;
    flex-shrink: 0;
    transform-origin: center center;
    animation: none;
    transition: box-shadow 0.4s;
  }
  .vinyl::before {
    content:'';
    position:absolute;
    inset:0; border-radius:50%;
    background: conic-gradient(
      rgba(255,255,255,0.03) 0deg, transparent 40deg,
      rgba(255,255,255,0.02) 80deg, transparent 120deg,
      rgba(255,255,255,0.03) 160deg, transparent 200deg,
      rgba(255,255,255,0.02) 240deg, transparent 280deg,
      rgba(255,255,255,0.03) 320deg, transparent 360deg
    );
  }
  .playing .vinyl {
    animation: vinylSpin 2.4s linear infinite;
    box-shadow: 0 0 0 1.5px rgba(201,168,76,0.4), 0 0 30px rgba(201,168,76,0.15), 0 8px 32px rgba(0,0,0,0.8);
  }
  .vinyl.spinning {
    animation: vinylSpin 2.4s linear infinite !important;
    box-shadow: 0 0 0 1.5px rgba(201,168,76,0.4), 0 0 30px rgba(201,168,76,0.15), 0 8px 32px rgba(0,0,0,0.8) !important;
  }
  @keyframes vinylSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .vinyl-label {
    position:absolute;
    width:46px; height:46px;
    border-radius:50%;
    background: radial-gradient(circle, #2a1f08 0%, #1a1208 60%, #0d0a04 100%);
    border: 1px solid rgba(201,168,76,0.35);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px; z-index:2;
  }
  .vinyl-label-text {
    font-family:'Cinzel',serif; font-size:5px;
    color: var(--gold); letter-spacing:1px; text-align:center; line-height:1.2;
  }
  .vinyl-dot { width:5px; height:5px; border-radius:50%; background:var(--gold); opacity:0.7; }

  .tonearm {
    position:absolute; top:6px; right:10px;
    width:56px; height:56px; z-index:3; pointer-events:none;
    transform-origin: 90% 10%;
    transform: rotate(-22deg);
    transition: transform 1.2s cubic-bezier(0.4,0,0.2,1);
  }
  .playing .tonearm { transform: rotate(-5deg); }

  /* ring animation when playing */
  .cover-ring {
    position: absolute;
    inset: -2px;
    border-radius: calc(var(--radius) + 2px);
    border: 1.5px solid transparent;
    background: linear-gradient(var(--bg), var(--bg)) padding-box,
                linear-gradient(90deg, var(--gold), transparent, var(--gold)) border-box;
    animation: ringRotate 4s linear infinite;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .playing .cover-ring { opacity: 1; }
  @keyframes ringRotate {
    from { filter: hue-rotate(0deg); }
    to { filter: hue-rotate(360deg); }
  }

  /* LEDs */
  .leds-wrap {
    position: absolute; bottom: 10px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 5px; align-items: flex-end; z-index:4;
  }
  .led {
    width: 5px; border-radius: 3px; background: var(--gold);
    opacity: 0.15; transition: height 0.07s, opacity 0.07s, box-shadow 0.07s; height: 4px;
  }
  .playing .led { opacity: 0.9; }

  /* Track info */
  .track-info {
    text-align: center;
    margin-bottom: 16px;
    min-height: 48px;
  }
  .track-title {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 8px;
  }
  .track-artist {
    font-size: 13px;
    color: var(--text2);
    letter-spacing: 0.5px;
  }
  .no-track { font-size: 13px; color: var(--text3); font-style: italic; }

  /* Progress */
  .progress-area { margin-bottom: 10px; }
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--surface3);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s linear;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -5px; top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(201,168,76,0.6);
  }
  .time-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); font-family: 'DM Sans', monospace; }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 14px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    border-radius: 50%;
    transition: all 0.2s;
  }
  .ctrl-btn:active { transform: scale(0.88); }
  .ctrl-btn.active { color: var(--gold); }
  .ctrl-btn svg { width: 22px; height: 22px; }
  .play-btn {
    width: 60px; height: 60px;
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(201,168,76,0.35);
    transition: all 0.2s;
  }
  .play-btn:active { transform: scale(0.92); box-shadow: 0 2px 10px rgba(201,168,76,0.3); }
  .play-btn svg { width: 26px; height: 26px; }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 4px;
  }
  .volume-row svg { width: 16px; height: 16px; color: var(--text3); flex-shrink: 0; }
  input[type=range].volume-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--surface3);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range].volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(201,168,76,0.4);
  }

  /* PLAYLIST */
  .playlist-section {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--border);
    position: relative;
    z-index: 2;
  }
  .playlist-header {
    padding: 12px 20px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .playlist-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold-dim);
    text-transform: uppercase;
  }
  .track-count { font-size: 11px; color: var(--text3); }

  .playlist-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 12px;
    -webkit-overflow-scrolling: touch;
  }
  .playlist-scroll::-webkit-scrollbar { display: none; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--text3);
    font-size: 13px;
    text-align: center;
    padding: 20px;
  }
  .empty-state svg { width: 40px; height: 40px; opacity: 0.3; }

  .track-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
    margin-bottom: 4px;
  }
  .track-item:active { background: var(--surface2); }
  .track-item.active {
    background: var(--surface2);
    border-color: var(--border);
  }
  .track-num {
    font-size: 11px;
    color: var(--text3);
    min-width: 18px;
    text-align: center;
    font-family: 'DM Sans', monospace;
  }
  .track-item.active .track-num { color: var(--gold); }
  .track-num-playing {
    display: none;
  }
  .track-item.active.is-playing .track-num { display: none; }
  .track-item.active.is-playing .track-num-playing { display: flex; align-items: center; gap: 2px; }
  .bar-mini { width: 3px; border-radius: 2px; background: var(--gold); animation: barAnim 0.7s ease-in-out infinite alternate; }
  .bar-mini:nth-child(2) { animation-delay: 0.2s; height: 8px; }
  .bar-mini:nth-child(3) { animation-delay: 0.1s; height: 12px; }
  .bar-mini:nth-child(1) { height: 6px; }
  @keyframes barAnim { from { transform: scaleY(0.4); } to { transform: scaleY(1.2); } }

  .track-thumb {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: var(--surface3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .track-thumb svg { width: 18px; height: 18px; color: var(--text3); }
  .track-item.active .track-thumb { border-color: var(--border2); }
  .track-item.active .track-thumb svg { color: var(--gold); }

  .track-details { flex: 1; overflow: hidden; }
  .t-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-item.active .t-name { color: var(--gold-light); }
  .t-dur { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .remove-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .remove-btn:active { background: rgba(255,60,60,0.1); color: #ff4444; transform: scale(0.9); }
  .remove-btn svg { width: 16px; height: 16px; }

  #fileInput { display: none; }


</style>
</head>
<body>
<div class="app" id="app">
  <div class="bg-orb"></div>

  <header class="header">
    <div class="logo">
      Studio Seiko
      <span>MUSIC PLAYER</span>
    </div>
    <button class="add-btn" onclick="document.getElementById('fileInput').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Adicionar
    </button>
    <input type="file" id="fileInput" accept="audio/*" multiple>
  </header>

  <section class="player-section">
    <div class="cover-wrap">
      <div class="cover-art" id="coverArt">
        <div class="vinyl-wrap">
          <div class="vinyl" id="vinylDisc">
            <div class="vinyl-label">
              <div class="vinyl-label-text">STUDIO<br>SEIKO</div>
              <div class="vinyl-dot"></div>
            </div>
          </div>
          <!-- Braço toca-discos SVG -->
          <svg class="tonearm" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="48" cy="6" r="4" fill="#2a2a2a" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
            <line x1="48" y1="10" x2="30" y2="48" stroke="rgba(201,168,76,0.7)" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="30" cy="48" r="2.5" fill="rgba(201,168,76,0.8)"/>
          </svg>
        </div>
        <!-- LEDs na batida -->
        <div class="leds-wrap" id="ledsWrap">
          <div class="led" id="led0" style="height:4px"></div>
          <div class="led" id="led1" style="height:4px"></div>
          <div class="led" id="led2" style="height:4px"></div>
          <div class="led" id="led3" style="height:4px"></div>
          <div class="led" id="led4" style="height:4px"></div>
          <div class="led" id="led5" style="height:4px"></div>
          <div class="led" id="led6" style="height:4px"></div>
          <div class="led" id="led7" style="height:4px"></div>
          <div class="led" id="led8" style="height:4px"></div>
          <div class="led" id="led9" style="height:4px"></div>
          <div class="led" id="led10" style="height:4px"></div>
          <div class="led" id="led11" style="height:4px"></div>
        </div>
      </div>
      <div class="cover-ring"></div>
    </div>

    <div class="track-info" id="trackInfo">
      <div class="no-track">Nenhuma música selecionada</div>
    </div>

    <div class="progress-area">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-row">
        <span id="timeNow">0:00</span>
        <span id="timeTotal">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btnShuffle" title="Aleatório">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      </button>
      <button class="ctrl-btn" id="btnPrev" title="Anterior">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
      </button>
      <button class="play-btn" id="btnPlay" title="Play / Pause">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="ctrl-btn" id="btnNext" title="Próxima">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
      <button class="ctrl-btn" id="btnRepeat" title="Repetir">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>

    <div class="volume-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
      <input type="range" class="volume-slider" id="volSlider" min="0" max="100" value="80">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
    </div>
  </section>

  <section class="playlist-section">
    <div class="playlist-header">
      <span class="playlist-label">Playlist</span>
      <span class="track-count" id="trackCount">0 músicas</span>
    </div>
    <div class="playlist-scroll" id="playlistScroll">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Toque em <strong>Adicionar</strong> para<br>carregar suas músicas
      </div>
    </div>
  </section>
</div>

<script>
const audio = new Audio();
let tracks = [];
let current = -1;
let isPlaying = false;
let shuffle = false;
let repeat = false;

const app = document.getElementById('app');
const playIcon = document.getElementById('playIcon');
const progressFill = document.getElementById('progressFill');
const timeNow = document.getElementById('timeNow');
const timeTotal = document.getElementById('timeTotal');
const trackInfo = document.getElementById('trackInfo');
const playlistScroll = document.getElementById('playlistScroll');
const emptyState = document.getElementById('emptyState');
const trackCount = document.getElementById('trackCount');
const progressBar = document.getElementById('progressBar');
const coverArt = document.getElementById('coverArt');
const ledEls = Array.from({length:12}, (_,i) => document.getElementById('led'+i));

// Web Audio API para LEDs
let audioCtx = null, analyser = null, sourceNode = null, dataArr = null, ledRaf = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 64;
  dataArr = new Uint8Array(analyser.frequencyBinCount);
  sourceNode = audioCtx.createMediaElementSource(audio);
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function startLeds() {
  if (ledRaf) return;
  function tick() {
    ledRaf = requestAnimationFrame(tick);
    if (!analyser) return;
    analyser.getByteFrequencyData(dataArr);
    const bins = analyser.frequencyBinCount;
    const step = Math.floor(bins / 12);
    ledEls.forEach((led, i) => {
      const val = dataArr[i * step] || 0;
      const h = Math.max(4, Math.round((val / 255) * 36));
      const glow = val > 80 ? `0 0 ${Math.round(val/20)}px rgba(201,168,76,0.8)` : 'none';
      led.style.height = h + 'px';
      led.style.boxShadow = glow;
      const r = val > 180 ? '#ff9f3f' : val > 100 ? '#E8CC80' : '#C9A84C';
      led.style.background = r;
    });
  }
  tick();
}

function stopLeds() {
  if (ledRaf) { cancelAnimationFrame(ledRaf); ledRaf = null; }
  ledEls.forEach(l => { l.style.height = '4px'; l.style.boxShadow = 'none'; });
}

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function setPlaying(v) {
  isPlaying = v;
  const vinylDisc = document.getElementById('vinylDisc');
  if (v) {
    playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    app.classList.add('playing');
    if (vinylDisc) vinylDisc.classList.add('spinning');
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    startLeds();
  } else {
    playIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    app.classList.remove('playing');
    if (vinylDisc) vinylDisc.classList.remove('spinning');
    stopLeds();
  }
  renderList();
}

function loadTrack(idx, autoplay) {
  if (idx < 0 || idx >= tracks.length) return;
  current = idx;
  const t = tracks[idx];
  audio.src = t.url;
  trackInfo.innerHTML = `
    <div class="track-title">${t.name}</div>
    <div class="track-artist">Studio Seiko Player</div>
  `;
  progressFill.style.width = '0%';
  timeNow.textContent = '0:00';
  timeTotal.textContent = t.dur || '0:00';
  renderList();
  if (autoplay) { audio.play().catch(() => {}); setPlaying(true); }
}

function renderList() {
  playlistScroll.innerHTML = '';
  if (!tracks.length) { playlistScroll.appendChild(emptyState); return; }
  tracks.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'track-item' + (i === current ? ' active' : '') + (i === current && isPlaying ? ' is-playing' : '');
    div.innerHTML = `
      <div class="track-num">${String(i+1).padStart(2,'0')}
        <div class="track-num-playing">
          <div class="bar-mini"></div><div class="bar-mini"></div><div class="bar-mini"></div>
        </div>
      </div>
      <div class="track-thumb">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <div class="track-details">
        <div class="t-name">${t.name}</div>
        <div class="t-dur">${t.dur || '--:--'}</div>
      </div>
      <button class="remove-btn" data-idx="${i}" title="Remover">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    `;
    div.addEventListener('click', e => {
      if (e.target.closest('.remove-btn')) return;
      if (i === current) { isPlaying ? (audio.pause(), setPlaying(false)) : (audio.play().catch(()=>{}), setPlaying(true)); }
      else loadTrack(i, true);
    });
    const removeBtn = div.querySelector('.remove-btn');
    removeBtn.addEventListener('click', e => {
      e.stopPropagation();
      removeTrack(i);
    });
    playlistScroll.appendChild(div);
  });
  trackCount.textContent = tracks.length + (tracks.length === 1 ? ' música' : ' músicas');
}

function removeTrack(idx) {
  URL.revokeObjectURL(tracks[idx].url);
  tracks.splice(idx, 1);
  if (current === idx) {
    audio.pause(); setPlaying(false);
    trackInfo.innerHTML = '<div class="no-track">Nenhuma música selecionada</div>';
    progressFill.style.width = '0%';
    timeNow.textContent = '0:00'; timeTotal.textContent = '0:00';
    current = tracks.length > 0 ? 0 : -1;
    if (current === 0) loadTrack(0, false);
  } else if (current > idx) { current--; }
  renderList();
  trackCount.textContent = tracks.length + (tracks.length === 1 ? ' música' : ' músicas');
}

document.getElementById('btnPlay').onclick = () => {
  if (!tracks.length) { document.getElementById('fileInput').click(); return; }
  if (current < 0) { loadTrack(0, true); return; }
  if (isPlaying) { audio.pause(); setPlaying(false); }
  else { audio.play().catch(() => {}); setPlaying(true); }
};

document.getElementById('btnNext').onclick = () => {
  if (!tracks.length) return;
  let n = shuffle ? Math.floor(Math.random() * tracks.length) : (current + 1) % tracks.length;
  loadTrack(n, isPlaying);
};
document.getElementById('btnPrev').onclick = () => {
  if (!tracks.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  let n = shuffle ? Math.floor(Math.random() * tracks.length) : (current - 1 + tracks.length) % tracks.length;
  loadTrack(n, isPlaying);
};

document.getElementById('btnShuffle').onclick = function() {
  shuffle = !shuffle; this.classList.toggle('active', shuffle);
};
document.getElementById('btnRepeat').onclick = function() {
  repeat = !repeat; audio.loop = repeat; this.classList.toggle('active', repeat);
};

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  timeNow.textContent = fmt(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => { timeTotal.textContent = fmt(audio.duration); if(tracks[current]) tracks[current].dur = fmt(audio.duration); });
audio.addEventListener('ended', () => {
  if (!repeat && !audio.loop) {
    const n = (current + 1) % tracks.length;
    loadTrack(n === 0 && !shuffle ? 0 : (shuffle ? Math.floor(Math.random()*tracks.length) : n), tracks.length > 1 || n !== 0);
    if (n === 0 && !shuffle && tracks.length === 1) setPlaying(false);
  }
});

progressBar.addEventListener('click', e => {
  if (!audio.duration) return;
  const r = progressBar.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});

document.getElementById('volSlider').addEventListener('input', function() { audio.volume = this.value / 100; });
audio.volume = 0.8;

document.getElementById('fileInput').addEventListener('change', function() {
  const files = Array.from(this.files);
  const startIdx = tracks.length;
  files.forEach((f, fi) => {
    const url = URL.createObjectURL(f);
    const name = f.name.replace(/\.[^.]+$/, '');
    tracks.push({ name, url, dur: null });
    const tmp = new Audio(url);
    const capturedIdx = startIdx + fi;
    tmp.addEventListener('loadedmetadata', () => {
      if (tracks[capturedIdx]) { tracks[capturedIdx].dur = fmt(tmp.duration); renderList(); }
    });
  });
  renderList();
  if (current < 0 && tracks.length > 0) loadTrack(0, false);
  this.value = '';
});

emptyState.querySelector && playlistScroll.appendChild(emptyState);
renderList();
</script>
</body>
</html>
